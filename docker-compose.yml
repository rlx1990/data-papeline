x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.0
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db:5432/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./src:/opt/airflow/src
  depends_on:
    - airflow_db

services:

  # -------------------------
  # DATA WAREHOUSE
  # -------------------------
  dw_postgres:
    image: postgres:18
    container_name: dw_postgres
    environment:
      POSTGRES_USER: dw_user
      POSTGRES_PASSWORD: dw_password
      POSTGRES_DB: data_warehouse
    ports:
      - "5433:5432"
    volumes:
      - dw_postgres_volume:/var/lib/postgresql
    restart: always

  # -------------------------
  # AIRFLOW METADATA DATABASE
  # -------------------------
  airflow_db:
    image: postgres:15
    container_name: airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_volume:/var/lib/postgresql

  # -------------------------
  # AIRFLOW INIT
  # -------------------------

  airflow_init:
    <<: *airflow-common
    container_name: airflow_init
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Douglas --lastname Soares --role Admin --email admin@email.com"
    restart: "no"

  # -------------------------
  # AIRFLOW WEBSERVER
  # -------------------------
  airflow_webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  # -------------------------
  # AIRFLOW SCHEDULER
  # -------------------------
  airflow_scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: always

volumes:
  dw_postgres_volume:
  airflow_db_volume: